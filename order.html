<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Order — Coffee Shop</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      min-height: 100%;
      font-family: "Inter", system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      background: #F5F5F5;
      color: #1C1C2E;
    }

    .app {
      width: 100%;
      max-width: 375px;
      min-height: 100vh;
      min-height: 100dvh;
      margin: 0 auto;
      padding-bottom: 96px;
      background: #F5F5F5;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px 8px;
      background: #F5F5F5;
    }

    .topbar__title {
      flex: 1;
      text-align: center;
      font-size: 17px;
      font-weight: 700;
      color: #1C1C2E;
    }

    .icon-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
      border: none;
      background: transparent;
      cursor: pointer;
      color: #1C1C2E;
      border-radius: 10px;
      text-decoration: none;
    }

    .toggle {
      display: flex;
      margin: 8px 20px 20px;
      padding: 4px;
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 2px 12px rgba(28, 28, 46, 0.06);
    }

    .toggle__btn {
      flex: 1;
      height: 40px;
      border: none;
      border-radius: 11px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      background: transparent;
      color: #6b6b78;
      transition: background 0.25s ease, color 0.25s ease;
    }

    .toggle__btn--active {
      background: #C07850;
      color: #fff;
      box-shadow: 0 2px 10px rgba(192, 120, 80, 0.35);
    }

    .section {
      margin: 0 20px 18px;
    }

    .section__title {
      font-size: 17px;
      font-weight: 700;
      margin-bottom: 12px;
      color: #1C1C2E;
    }

    .card-white {
      background: #fff;
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 4px 20px rgba(28, 28, 46, 0.06);
    }

    .address-text {
      font-size: 14px;
      line-height: 1.45;
      color: #6b6b78;
      margin-bottom: 14px;
    }

    .address-actions {
      display: flex;
      gap: 10px;
    }

    .btn-outline {
      flex: 1;
      height: 40px;
      border: 1.5px solid #C07850;
      border-radius: 12px;
      background: #fff;
      color: #C07850;
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }

    .btn-outline--fill {
      background: rgba(192, 120, 80, 0.1);
    }

    .line-item {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .line-item__img {
      width: 64px;
      height: 64px;
      border-radius: 12px;
      object-fit: cover;
      background: #eee;
    }

    .line-item__info {
      flex: 1;
      min-width: 0;
    }

    .line-item__name {
      font-size: 15px;
      font-weight: 700;
      color: #1C1C2E;
    }

    .line-item__sub {
      font-size: 12px;
      color: #8e8e9a;
      margin-top: 2px;
    }

    .qty {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .qty__btn {
      width: 32px;
      height: 32px;
      border: none;
      border-radius: 8px;
      background: #F5F5F5;
      color: #1C1C2E;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      line-height: 1;
    }

    .qty__val {
      font-size: 15px;
      font-weight: 600;
      min-width: 12px;
      text-align: center;
    }

    .discount-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      margin-top: 12px;
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 2px 12px rgba(28, 28, 46, 0.06);
      cursor: pointer;
    }

    .discount-row__text {
      font-size: 14px;
      font-weight: 600;
      color: #C07850;
    }

    .summary-line {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      font-size: 14px;
      margin-bottom: 10px;
      color: #6b6b78;
    }

    .summary-line:last-child {
      margin-bottom: 0;
    }

    .summary-line__label {
      font-weight: 500;
    }

    .summary-line__value {
      font-weight: 600;
      color: #1C1C2E;
    }

    .strike {
      text-decoration: line-through;
      color: #a8a8b4;
      font-weight: 500;
      margin-right: 8px;
    }

    .payment-select {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      margin-top: 14px;
      padding: 14px 16px;
      border: none;
      border-radius: 14px;
      background: #F5F5F5;
      font-family: inherit;
      font-size: 15px;
      font-weight: 600;
      color: #1C1C2E;
      cursor: pointer;
    }

    .order-footer {
      position: fixed;
      left: 50%;
      bottom: 0;
      transform: translateX(-50%);
      width: 375px;
      max-width: 100%;
      padding: 12px 20px;
      padding-bottom: max(12px, env(safe-area-inset-bottom));
      background: #fff;
      box-shadow: 0 -4px 24px rgba(28, 28, 46, 0.08);
      border-radius: 24px 24px 0 0;
    }

    .order-footer__btn {
      width: 100%;
      height: 52px;
      border: none;
      border-radius: 14px;
      background: #C07850;
      color: #fff;
      font-family: inherit;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 16px rgba(192, 120, 80, 0.35);
    }

    .order-footer__btn:active {
      transform: scale(0.98);
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <a class="icon-btn" href="detail.html" aria-label="Volver">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M15 18l-6-6 6-6" />
        </svg>
      </a>
      <h1 class="topbar__title">Order</h1>
      <span style="width: 40px"></span>
    </header>

    <div class="toggle" role="group" aria-label="Tipo de entrega">
      <button type="button" class="toggle__btn toggle__btn--active">Deliver</button>
      <button type="button" class="toggle__btn">Pick Up</button>
    </div>

    <section class="section">
      <h2 class="section__title">Delivery Address</h2>
      <div class="card-white">
        <p class="address-text">
          Jl. Kpg Sutoyo No. 620, Bilzen, Tanjungbalai
        </p>
        <div class="address-actions">
          <button type="button" class="btn-outline">Edit Address</button>
          <button type="button" class="btn-outline btn-outline--fill">Add Note</button>
        </div>
      </div>
    </section>

    <section class="section">
      <div class="card-white">
        <div class="line-item">
          <img
            class="line-item__img"
            src="https://images.unsplash.com/photo-1509042239860-f550ce710b93?w=200"
            alt=""
          />
          <div class="line-item__info">
            <p class="line-item__name">Caffe Mocha</p>
            <p class="line-item__sub">Deep Foam</p>
          </div>
          <div class="qty">
            <button type="button" class="qty__btn" aria-label="Menos">−</button>
            <span class="qty__val">1</span>
            <button type="button" class="qty__btn" aria-label="Más">+</button>
          </div>
        </div>
      </div>

      <div class="discount-row" role="button" tabindex="0">
        <span class="discount-row__text">1 Discount is Applied</span>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#C07850" stroke-width="2">
          <path d="M9 18l6-6-6-6" />
        </svg>
      </div>
    </section>

    <section class="section">
      <h2 class="section__title">Payment Summary</h2>
      <div class="card-white">
        <div class="summary-line">
          <span class="summary-line__label">Price</span>
          <span class="summary-line__value">$4.53</span>
        </div>
        <div class="summary-line">
          <span class="summary-line__label">Delivery Fee</span>
          <span class="summary-line__value">
            <span class="strike">$2.0</span>
            $1.0
          </span>
        </div>
        <button type="button" class="payment-select">
          <span>Cash/Wallet $5.53</span>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M6 9l6 6 6-6" />
          </svg>
        </button>
      </div>
    </section>
  </div>

  <div class="order-footer">
    <a class="order-footer__btn" href="delivery.html">Order</a>
  </div>
  <script>
    document.querySelectorAll(".toggle__btn").forEach(function (btn) {
      btn.addEventListener("click", function () {
        document.querySelectorAll(".toggle__btn").forEach(function (b) {
          b.classList.remove("toggle__btn--active");
        });
        btn.classList.add("toggle__btn--active");
      });
    });
  </script>
</body>
</html>
