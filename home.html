<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Home — Coffee Shop</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      min-height: 100%;
      font-family: "Inter", system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      background: #F5F5F5;
      color: #1C1C2E;
    }

    .app {
      width: 100%;
      max-width: 375px;
      min-height: 100vh;
      min-height: 100dvh;
      margin: 0 auto;
      padding-bottom: 88px;
      background: #F5F5F5;
    }

    .header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      padding: 16px 20px 12px;
      background: #F5F5F5;
    }

    .header__loc-label {
      font-size: 11px;
      font-weight: 500;
      color: #8e8e9a;
      margin-bottom: 2px;
    }

    .header__loc-row {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 15px;
      font-weight: 700;
      color: #1C1C2E;
    }

    .header__chevron {
      width: 14px;
      height: 14px;
      opacity: 0.6;
    }

    .icon-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
      border: none;
      background: transparent;
      cursor: pointer;
      color: #1C1C2E;
      border-radius: 10px;
    }

    .icon-btn:active {
      background: rgba(0, 0, 0, 0.05);
    }

    .search-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 20px 16px;
    }

    .search {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 10px;
      height: 48px;
      padding: 0 14px;
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 2px 12px rgba(28, 28, 46, 0.06);
    }

    .search svg {
      flex-shrink: 0;
      color: #8e8e9a;
    }

    .search input {
      flex: 1;
      border: none;
      outline: none;
      font-family: inherit;
      font-size: 14px;
      color: #1C1C2E;
      background: transparent;
    }

    .search input::placeholder {
      color: #a8a8b4;
    }

    .filter-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 48px;
      height: 48px;
      border: none;
      border-radius: 14px;
      background: #C07850;
      color: #fff;
      cursor: pointer;
      flex-shrink: 0;
      box-shadow: 0 4px 14px rgba(192, 120, 80, 0.35);
    }

    .filter-btn:active {
      transform: scale(0.96);
    }

    .promo {
      margin: 0 20px 20px;
      padding: 18px 20px;
      border-radius: 16px;
      background:
        linear-gradient(135deg, rgba(0, 0, 0, 0.35) 0%, rgba(0, 0, 0, 0.5) 100%),
        url("https://images.unsplash.com/photo-1509042239860-f550ce710b93?w=800&q=80") center / cover no-repeat;
      background-color: #1C1C2E;
    }

    .promo__badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 8px;
      background: #C07850;
      color: #fff;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 10px;
    }

    .promo__text {
      color: #fff;
      font-size: 18px;
      font-weight: 700;
      line-height: 1.3;
    }

    .tabs {
      display: flex;
      gap: 8px;
      padding: 0 20px 16px;
      overflow-x: auto;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }

    .tabs::-webkit-scrollbar {
      display: none;
    }

    .tab {
      flex-shrink: 0;
      padding: 10px 18px;
      border: none;
      border-radius: 24px;
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      background: #fff;
      color: #6b6b78;
      box-shadow: 0 2px 8px rgba(28, 28, 46, 0.06);
    }

    .tab--active {
      background: #C07850;
      color: #fff;
      box-shadow: 0 4px 14px rgba(192, 120, 80, 0.3);
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      padding: 0 20px 24px;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(28, 28, 46, 0.08);
    }

    .card__img-wrap {
      position: relative;
      aspect-ratio: 1;
      background: #eee;
    }

    .card__img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .card__rating {
      position: absolute;
      top: 8px;
      right: 8px;
      display: flex;
      align-items: center;
      gap: 3px;
      padding: 4px 8px;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.92);
      font-size: 11px;
      font-weight: 600;
      color: #1C1C2E;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
    }

    .card__body {
      padding: 12px 12px 14px;
    }

    .card__name {
      font-size: 14px;
      font-weight: 700;
      color: #1C1C2E;
      margin-bottom: 4px;
    }

    .card__desc {
      font-size: 11px;
      color: #8e8e9a;
      margin-bottom: 10px;
      line-height: 1.35;
    }

    .card__row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .card__price {
      font-size: 16px;
      font-weight: 700;
      color: #1C1C2E;
    }

    .card__add {
      width: 32px;
      height: 32px;
      border: none;
      border-radius: 10px;
      background: #C07850;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .card__add:active {
      transform: scale(0.95);
    }

    .bottom-nav {
      position: fixed;
      left: 50%;
      bottom: 0;
      transform: translateX(-50%);
      width: 100%;
      max-width: 375px;
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding: 12px 8px 22px;
      padding-bottom: max(22px, env(safe-area-inset-bottom));
      background: #fff;
      box-shadow: 0 -4px 24px rgba(28, 28, 46, 0.08);
      border-radius: 24px 24px 0 0;
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 56px;
      height: 44px;
      border: none;
      background: transparent;
      cursor: pointer;
      color: #a8a8b4;
    }

    .nav-item--active {
      color: #C07850;
    }

    .nav-item svg {
      width: 24px;
      height: 24px;
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="header">
      <div>
        <p class="header__loc-label">Location</p>
        <div class="header__loc-row">
          Bilzen, Tanjungbalai
          <svg class="header__chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path d="M6 9l6 6 6-6" />
          </svg>
        </div>
      </div>
      <button type="button" class="icon-btn" aria-label="Menú">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M4 6h16M4 12h16M4 18h16" />
        </svg>
      </button>
    </header>

    <div class="search-row">
      <div class="search">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="7" />
          <path d="M20 20l-4-4" />
        </svg>
        <input type="search" placeholder="Search coffee" autocomplete="off" />
      </div>
      <button type="button" class="filter-btn" aria-label="Filtros">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M4 6h16M7 12h10M10 18h4" />
        </svg>
      </button>
    </div>

    <section class="promo" aria-label="Promoción">
      <span class="promo__badge">Promo</span>
      <p class="promo__text">Buy one get one FREE</p>
    </section>

    <div class="tabs" role="tablist">
      <button type="button" class="tab tab--active" role="tab" aria-selected="true">All Coffee</button>
      <button type="button" class="tab" role="tab" aria-selected="false">Machiato</button>
      <button type="button" class="tab" role="tab" aria-selected="false">Latte</button>
      <button type="button" class="tab" role="tab" aria-selected="false">Americano</button>
    </div>

    <div class="grid">
      <article class="card">
        <div class="card__img-wrap">
          <img class="card__img" src="https://images.unsplash.com/photo-1572442388796-11668a67e53d?w=400&q=80" alt="Caffe Mocha" />
          <span class="card__rating"><span aria-hidden="true">⭐</span> 4.8</span>
        </div>
        <div class="card__body">
          <h2 class="card__name">Caffe Mocha</h2>
          <p class="card__desc">Deep Foam</p>
          <div class="card__row">
            <span class="card__price">$4.53</span>
            <button type="button" class="card__add" aria-label="Añadir Caffe Mocha">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <path d="M12 5v14M5 12h14" />
              </svg>
            </button>
          </div>
        </div>
      </article>

      <article class="card">
        <div class="card__img-wrap">
          <img class="card__img" src="https://images.unsplash.com/photo-1570968915860-54d5c301fa29?w=400&q=80" alt="Flat White" />
          <span class="card__rating"><span aria-hidden="true">⭐</span> 4.9</span>
        </div>
        <div class="card__body">
          <h2 class="card__name">Flat White</h2>
          <p class="card__desc">Espresso</p>
          <div class="card__row">
            <span class="card__price">$3.53</span>
            <button type="button" class="card__add" aria-label="Añadir Flat White">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <path d="M12 5v14M5 12h14" />
              </svg>
            </button>
          </div>
        </div>
      </article>

      <article class="card">
        <div class="card__img-wrap">
          <img class="card__img" src="https://images.unsplash.com/photo-1534778101976-62847782c213?w=400&q=80" alt="Cappuccino" />
          <span class="card__rating"><span aria-hidden="true">⭐</span> 4.7</span>
        </div>
        <div class="card__body">
          <h2 class="card__name">Cappuccino</h2>
          <p class="card__desc">Milk Foam</p>
          <div class="card__row">
            <span class="card__price">$4.10</span>
            <button type="button" class="card__add" aria-label="Añadir Cappuccino">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <path d="M12 5v14M5 12h14" />
              </svg>
            </button>
          </div>
        </div>
      </article>

      <article class="card">
        <div class="card__img-wrap">
          <img class="card__img" src="https://images.unsplash.com/photo-1510707579220-e07b967c0326?w=400&q=80" alt="Americano" />
          <span class="card__rating"><span aria-hidden="true">⭐</span> 4.6</span>
        </div>
        <div class="card__body">
          <h2 class="card__name">Americano</h2>
          <p class="card__desc">Black</p>
          <div class="card__row">
            <span class="card__price">$3.00</span>
            <button type="button" class="card__add" aria-label="Añadir Americano">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <path d="M12 5v14M5 12h14" />
              </svg>
            </button>
          </div>
        </div>
      </article>
    </div>

    <nav class="bottom-nav" aria-label="Navegación principal">
      <button type="button" class="nav-item nav-item--active" aria-current="page" aria-label="Inicio">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 10.5L12 3l9 7.5V20a1 1 0 01-1 1h-5v-6H9v6H4a1 1 0 01-1-1v-9.5z" />
        </svg>
      </button>
      <button type="button" class="nav-item" aria-label="Favoritos">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20.8 4.6a5.5 5.5 0 00-7.8 0L12 5.6l-1-1a5.5 5.5 0 00-7.8 7.8l1 1L12 21l7.8-7.6 1-1a5.5 5.5 0 000-7.8z" />
        </svg>
      </button>
      <button type="button" class="nav-item" aria-label="Bolsa">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M6 8h15l-1.5 12H7.5L6 8z" />
          <path d="M9 8V6a3 3 0 016 0v2" />
        </svg>
      </button>
      <button type="button" class="nav-item" aria-label="Notificaciones">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18 8a6 6 0 10-12 0c0 7-3 7-3 7h18s-3 0-3-7" />
          <path d="M13.7 21a2 2 0 01-3.4 0" />
        </svg>
      </button>
    </nav>
  </div>
</body>
</html>
