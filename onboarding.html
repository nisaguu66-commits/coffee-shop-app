<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Onboarding — Coffee Shop</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
      font-family: "Inter", system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .app {
      width: 100%;
      max-width: 375px;
      min-height: 100%;
      margin: 0 auto;
      position: relative;
      overflow: hidden;
    }

    .screen {
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      position: relative;
      background-color: #1C1C2E;
    }

    .screen__bg {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(28, 28, 46, 0.25) 0%, rgba(28, 28, 46, 0.85) 55%, #1C1C2E 100%),
        linear-gradient(135deg, #2d1f18 0%, #1a1210 35%, #3d2818 70%, #1C1C2E 100%),
        url("https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?w=800&q=80") center / cover no-repeat;
    }

    .screen__overlay {
      position: absolute;
      inset: 0;
      background: rgba(12, 10, 18, 0.55);
      pointer-events: none;
    }

    .content {
      position: relative;
      z-index: 1;
      padding: 32px 24px 48px;
    }

    .title {
      color: #fff;
      font-size: 32px;
      font-weight: 700;
      line-height: 1.2;
      letter-spacing: -0.02em;
      margin-bottom: 16px;
    }

    .subtitle {
      color: rgba(255, 255, 255, 0.65);
      font-size: 15px;
      font-weight: 400;
      line-height: 1.55;
      margin-bottom: 40px;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 56px;
      border: none;
      border-radius: 30px;
      background: #C07850;
      color: #fff;
      font-family: inherit;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s ease, transform 0.15s ease;
    }

    .btn:hover {
      background: #a86845;
    }

    .btn:active {
      transform: scale(0.98);
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="screen">
      <div class="screen__bg" aria-hidden="true"></div>
      <div class="screen__overlay" aria-hidden="true"></div>
      <div class="content">
        <h1 class="title">Fall in Love with Coffee in Blissful Delight!</h1>
        <p class="subtitle">Welcome to our cozy coffee corner, where every cup is a delightful for you.</p>
        <a class="btn" href="home.html">Get Started</a>
      </div>
    </div>
  </div>
</body>
</html>
